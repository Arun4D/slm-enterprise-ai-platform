name: github_actions_agent
version: 1.0.0
parser:
  max_log_size_mb: 20
  supported_inputs:
    - pasted_text
    - browser_upload
    - local_file_path
  validation_extensions:
    - ".yml"
    - ".yaml"
    - ".txt"
    - ".log"
  error_keywords:
    - "Error: Process completed with exit code"
    - "fatal:"
    - "unhandled exception"
    - "npm ERR!"
    - "pip install"
    - "command not found"
suggested_repairs:
  node_version: "Upgrade Node.js version in setup-node step to match project requirements."
  docker_auth: "Configure docker credentials via login action before pulling private images."
  npm_cache: "Utilize actions/cache to persist node_modules across runs to avoid build timeout."
  unrecognized_cmd: "Install missing runner dependencies or execute setup actions before command invocation."
generation:
  mode: deterministic_template
  default_templates:
    - node_ci
    - python_ci
  orchestrator_model: qwen2.5-coder-1.5b-instruct-gguf
  slm_execution_policy: route_plan_summarize_only
