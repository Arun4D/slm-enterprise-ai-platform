name: ansible_agent
version: 1.0.0
inventory:
  hosts_file: "hosts.ini"
  groups:
    - "webservers"
    - "databases"
rules:
  supported_inputs:
    - pasted_text
    - browser_upload
    - local_file_path
  validation_extensions:
    - ".yml"
    - ".yaml"
    - ".ini"
    - ".txt"
  disallowed_tasks:
    - "shell"
    - "command"
  force_handlers: true
generation:
  mode: deterministic_template
  default_templates:
    - nginx_webserver
    - system_updates
    - azure_vnet_subnets
  cloud_collections:
    azure:
      collection: azure.azcollection
      modules:
        - azure_rm_resourcegroup
        - azure_rm_virtualnetwork
        - azure_rm_subnet
  orchestrator_model: qwen2.5-coder-1.5b-instruct-gguf
  slm_execution_policy: route_plan_summarize_only
company_standards:
  enforce_naming_conventions: true
  require_task_names: true
  disallow_shell_commands: true
  require_become_explicit: true
  enforce_no_log_for_secrets: true
  require_tags:
    - "Environment"
    - "Owner"
    - "ManagedBy"
  allowed_hosts:
    - "webservers"
    - "databases"
    - "localhost"
