name: ansible_agent
version: 1.0.0
inventory:
  hosts_file: "hosts.ini"
  groups:
    - "webservers"
    - "databases"
rules:
  supported_inputs:
    - pasted_text
    - browser_upload
    - local_file_path
  validation_extensions:
    - ".yml"
    - ".yaml"
    - ".ini"
    - ".txt"
  disallowed_tasks:
    - "shell"
    - "command"  # Discourage shell module over specialized modules
  force_handlers: true
generation:
  mode: deterministic_template
  default_templates:
    - nginx_webserver
    - system_updates
    - azure_vnet_subnets
  cloud_collections:
    azure:
      collection: azure.azcollection
      modules:
        - azure_rm_resourcegroup
        - azure_rm_virtualnetwork
        - azure_rm_subnet
  orchestrator_model: qwen2.5-1.5b-instruct-gguf
  slm_execution_policy: route_plan_summarize_only
